base_url = "https://viz.os2x.com"
title = "Slate Magic"
description = "dashboard for quick access"
author = "0xxx"
theme = "landing-grid/themes/landing-grid"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true
minify_html = true
build_search_index = true

generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]


default_language = "en"

taxonomies = [
	{ name = "tags", feed = true, paginate_by = 10 },
	{ name = "categories", feed = true },
]


[extra]
favicon = "favicon.ico"
open_links_in_new_window = true

# Navigation categories (customize icons and names)
[[extra.nav]]
name = "favorites"
tag = "favorite"
icon = "star"

[[extra.nav]]
name = "agentic"
tag = "agentic"
icon = "code"

[[extra.nav]]
name = "tools"
tag = "tools"
icon = "wrench"

[[extra.nav]]
name = "social"
tag = "social"
icon = "users"

[[extra.nav]]
name = "work"
tag = "work"
icon = "briefcase"

[[extra.nav]]
name = "entertainment"
tag = "entertainment"
icon = "play"